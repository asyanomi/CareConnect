<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Daftar Dokter - HealthSync</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#e8f5e9,#e3f2fd);
    min-height:100vh;
    padding:40px;
}

.container{
    max-width:1300px;
    margin:auto;
}

.header{

    background:white;

    border-radius:20px;

    padding:35px;

    margin-bottom:30px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.header h1{

    color:#2e7d32;

    font-size:40px;

    margin-bottom:8px;
}

.header p{

    color:#666;

    font-size:15px;
}

.back-btn{

    text-decoration:none;

    color:#2e7d32;

    border:2px solid #2e7d32;

    padding:12px 22px;

    border-radius:10px;

    font-weight:bold;

    transition:.3s;
}

.back-btn:hover{

    background:#2e7d32;

    color:white;
}


.filter {
    margin: 20px 0;
}

select {
    padding:10px;
    border-radius:8px;
}

#doctor-list {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:20px;
}

.card{

    background:white;

    border-radius:18px;

    padding:25px;

    box-shadow:0 10px 30px rgba(0,0,0,.08);

    transition:.3s;
}

.card:hover{

    transform:translateY(-6px);

    box-shadow:0 18px 35px rgba(46,125,50,.18);
}

.card h3{

    color:#2e7d32;

    font-size:28px;

    margin-bottom:18px;
}

.card p{

    margin:8px 0;

    color:#555;
}

.available{

    color:#2e7d32;

    font-weight:bold;
}

.unavailable{

    color:#d32f2f;

    font-weight:bold;
}

hr{

    border:none;

    border-top:1px solid #eee;

    margin:18px 0;
}

label{

    font-weight:600;

    color:#444;
}

input{

    width:100%;

    padding:12px;

    margin-top:8px;

    margin-bottom:15px;

    border:1px solid #ddd;

    border-radius:10px;
}

.btn-book{

    width:100%;

    padding:14px;

    border:none;

    border-radius:10px;

    background:#2e7d32;

    color:white;

    font-size:15px;

    font-weight:bold;

    cursor:pointer;

    transition:.3s;
}

.btn-book:hover{

    background:#1b5e20;
}

/* RESPONSIVE */

@media(max-width:768px){

.header{

flex-direction:column;

align-items:flex-start;

gap:20px;

}

body{

padding:20px;

}

}
.phone {
    font-size:14px;
    margin-top:5px;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">

        <div>

            <h1>Daftar Dokter</h1>

            <p>
                Temukan dokter sesuai kebutuhan kesehatan Anda.
            </p>

        </div>

        <a id="backDashboard" class="back-btn">
            ← Dashboard
        </a>

    </div>

    <div class="filter">

        <select id="filter" onchange="loadDoctors()">

            <option value="all">Semua Spesialis</option>

            <option value="Umum">Umum</option>

            <option value="Anak">Anak</option>

            <option value="Jantung">Jantung</option>

        </select>

    </div>

    <div id="doctor-list">Memuat...</div>
</div>
</div>

<script>
async function loadDoctors() {

    const filter = document.getElementById("filter").value;

    const res = await fetch("http://localhost:3000/api/doctors");
    const data = await res.json();

    const container = document.getElementById("doctor-list");
    container.innerHTML = "";

    let doctors = data.doctors;

    if(filter !== "all"){
        doctors = doctors.filter(doc =>
            doc.specialization === filter
        );
    }

    doctors.forEach(doc=>{

        const status = doc.is_available
            ? `<span class="available">🟢 Available</span>`
            : `<span class="unavailable">🔴 Tidak Available</span>`;

        const rating = (Math.random()*2+3).toFixed(1);

        container.innerHTML += `
<div class="card">

    <h3>${doc.name}</h3>

    <p><b>Spesialis:</b> ${doc.specialization}</p>

   <p><b>Status :</b> ${status}</p>

<p><b>Telepon :</b> ${doc.phone || "-"}</p>

<p><b>Deskripsi :</b> ${doc.bio || "Belum ada deskripsi."}</p>

<hr>

<h4 style="margin-bottom:15px;color:#2e7d32;">
Pilih Jadwal Konsultasi
</h4>
    <label>Tanggal</label><br>
    <input type="date" id="date-${doc.id}"><br><br>

    <label>Jam</label><br>
    <input type="time" id="time-${doc.id}"><br><br>

    <button class="btn btn-book"
        onclick="bookingJanji('${doc.name}', ${doc.id})">
        Booking Janji
    </button>

</div>
`;
    });

}

loadDoctors();

async function bookingJanji(namaDokter, doctorId){

    const token = localStorage.getItem("token");

    if(!token){
        alert("Silakan login terlebih dahulu.");
        return;
    }

    const tanggal = document.getElementById(`date-${doctorId}`).value;
    const jam = document.getElementById(`time-${doctorId}`).value;

    if(!tanggal || !jam){
        alert("Silakan pilih tanggal dan jam.");
        return;
    }
        console.log({
        doctorId,
        tanggal,
        jam,
        token
    });
    try{

        const res = await fetch("/api/appointments",{
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                Authorization:`Bearer ${token}`
            },
            body:JSON.stringify({
                doctor_id: doctorId,
                date: tanggal,
                time: jam,
                notes: ""
            })
        });
            console.log(await res.clone().json());
        const data = await res.json();
        console.log(data.doctors);
        if(!res.ok){
            alert(data.message);
            return;
        }

        alert(data.message);

        window.location.href = "dashboard-patient.html";

    }catch(err){

        console.error(err);
        alert("Booking gagal.");

    }

}
const params = new URLSearchParams(window.location.search);
const from = params.get("from");

const backBtn = document.getElementById("backDashboard");

if(from === "patient"){
    backBtn.href = "dashboard-patient.html";
}
else{
    backBtn.href = "dashboard-doctor.html";
}
</script>
</body>
</html>
