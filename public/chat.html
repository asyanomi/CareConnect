<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HealthSync - Konsultasi Chat</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .chat-wrapper {
      max-width: 700px; margin: 2rem auto; padding: 0 1rem;
    }
    .chat-box {
      border: 1px solid #ddd; border-radius: 12px;
      height: 420px; overflow-y: auto;
      padding: 1rem; background: #f9fafb;
      display: flex; flex-direction: column; gap: 10px;
    }
    .bubble {
      max-width: 70%; padding: 10px 14px;
      border-radius: 16px; font-size: 0.9rem; line-height: 1.5;
    }
    .bubble.me {
      align-self: flex-end;
      background: #2e7d32; color: white;
      border-bottom-right-radius: 4px;
    }
    .bubble.other {
      align-self: flex-start;
      background: white; border: 1px solid #ddd;
      border-bottom-left-radius: 4px;
    }
    .bubble .sender { font-size: 0.75rem; font-weight: 600; margin-bottom: 4px; opacity: 0.75; }
    .bubble .time   { font-size: 0.7rem; margin-top: 4px; opacity: 0.6; text-align: right; }
    .chat-input {
      display: flex; gap: 10px; margin-top: 1rem;
    }
    .chat-input input {
      flex: 1; margin-bottom: 0;
    }
    .chat-input button { width: auto; padding: 12px 24px; }
    .chat-header {
      display: flex; align-items: center;
      gap: 10px; margin-bottom: 1rem;
    }
    .chat-header h2 { font-size: 1.1rem; color: #2e7d32; }
    .back-btn {
      background: none; border: 1px solid #2e7d32;
      color: #2e7d32; width: auto; padding: 8px 16px;
      font-size: 0.85rem; border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="chat-wrapper">
    <div class="chat-header">
      <button class="back-btn" onclick="history.back()">← Kembali</button>
      <h2 id="chat-title">Konsultasi Chat</h2>
    </div>
    <div class="chat-box" id="chat-box">
      <p style="color:#aaa; text-align:center; margin:auto;">Memuat pesan...</p>
    </div>
    <div class="chat-input">
      <input type="text" id="msg-input" placeholder="Ketik pesan..." 
             onkeydown="if(event.key==='Enter') sendMsg()" />
      <button onclick="sendMsg()">Kirim</button>
    </div>
  </div>
  <script src="js/chat.js"></script>
</body>
</html>
